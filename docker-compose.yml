version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockup_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockup_password}
      POSTGRES_DB: ${POSTGRES_DB:-stockup_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockup_user}:${POSTGRES_PASSWORD:-stockup_password}@db:5432/${POSTGRES_DB:-stockup_db}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    depends_on:
      - db
      - redis

  notifier:
    build:
      context: ./notifier
    environment:
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
    volumes:
      - ./notifier:/app
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
